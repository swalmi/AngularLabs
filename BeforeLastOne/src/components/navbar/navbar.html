<nav
  class="fixed top-0 z-50 w-full border-b border-white/5 bg-slate-950/70 backdrop-blur-xl transition-all"
>
  <div class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8">
    <div class="relative flex h-20 items-center justify-between">
      <div class="flex flex-1 items-center justify-center sm:items-stretch sm:justify-start">
        <div class="flex shrink-0 items-center gap-2">
          <svg class="h-8 w-auto text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
          <span class="text-xl font-bold tracking-widest text-white uppercase shadow-cyan-500 text-shadow-sm">AURA</span>
        </div>
        <div class="hidden sm:ml-10 sm:flex sm:items-center">
          <div class="flex space-x-6">
            <a
              routerLink="/home"
              routerLinkActive="bg-cyan-500/10 text-cyan-400 border-b-2 border-cyan-400 font-semibold"
              [routerLinkActiveOptions]="{ exact: true }"
              class="rounded-md px-3 py-2 text-sm font-medium text-slate-400 transition-all duration-300 hover:text-white"
              >Home</a
            >
            <a
              routerLink="/products"
              routerLinkActive="bg-cyan-500/10 text-cyan-400 border-b-2 border-cyan-400 font-semibold"
              [routerLinkActiveOptions]="{ exact: true }"
              class="rounded-md px-3 py-2 text-sm font-medium text-slate-400 transition-all duration-300 hover:text-white"
              >Products</a
            >
            <a
              routerLink="/contact"
              routerLinkActive="bg-cyan-500/10 text-cyan-400 border-b-2 border-cyan-400 font-semibold"
              [routerLinkActiveOptions]="{ exact: true }"
              class="rounded-md px-3 py-2 text-sm font-medium text-slate-400 transition-all duration-300 hover:text-white"
              >Contact</a
            >
          </div>
        </div>
      </div>
      <div class="absolute inset-y-0 right-0 flex items-center pr-2 sm:static sm:inset-auto sm:ml-6 sm:pr-0">
        <button
          type="button"
          class="relative rounded-full p-2 text-slate-400 transition-colors hover:bg-slate-800 hover:text-cyan-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:ring-offset-2 focus:ring-offset-slate-900"
        >
          <span class="sr-only">View notifications</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true" class="size-6">
            <path d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <!-- Profile dropdown -->
        <div class="relative ml-4">
          <button
            type="button"
            (click)="toggleProfileMenu()"
            [attr.aria-expanded]="profileMenuOpen()"
            aria-controls="profile-menu"
            class="relative flex rounded-full border-2 border-transparent focus:outline-none focus:border-cyan-400 transition-colors"
          >
            <span class="sr-only">Open user menu</span>
            <img
              src="https://images.unsplash.com/photo-1542385151-efd9000785a0?q=80&w=200&auto=format&fit=crop"
              alt="User"
              class="size-9 rounded-full bg-slate-800 object-cover ring-2 ring-slate-800"
            />
          </button>

          @if (profileMenuOpen()) {
            <div
              id="profile-menu"
              class="absolute right-0 z-10 mt-3 w-48 origin-top-right overflow-hidden rounded-xl border border-white/10 bg-slate-900 shadow-2xl shadow-cyan-900/20 backdrop-blur-3xl ring-1 ring-black/5"
            >
              <a href="#" class="block px-4 py-3 text-sm text-slate-300 transition-colors hover:bg-slate-800 hover:text-white">Your Profile</a>
              <a href="#" class="block px-4 py-3 text-sm text-slate-300 transition-colors hover:bg-slate-800 hover:text-white">Settings</a>
              <div class="h-px w-full bg-white/10"></div>
              <a href="#" class="block px-4 py-3 text-sm font-medium text-red-400 transition-colors hover:bg-red-400/10 hover:text-red-300">Sign out</a>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</nav>
