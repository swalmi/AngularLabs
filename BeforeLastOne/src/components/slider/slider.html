<section
  class="relative w-full overflow-hidden rounded-2xl shadow-2xl"
  (mouseenter)="pauseAutoPlay()"
  (mouseleave)="resumeAutoPlay()"
  aria-label="Featured promotions"
>
  <div
    class="flex h-120 transition-transform duration-700 ease-in-out"
    [style.transform]="translateX()"
  >
    @for (slide of slides; track slide.title) {
      <div
        class="relative min-w-full h-full select-none"
        role="group"
        [attr.aria-label]="slide.title"
      >
        <img
          [src]="slide.image"
          [alt]="slide.title"
          class="absolute inset-0 h-full w-full object-cover"
        />
        <div
          class="absolute inset-0 bg-linear-to-r from-black/70 via-black/40 to-transparent"
        ></div>
        <div class="relative flex h-full flex-col justify-center px-12 md:px-20">
          <span
            class="mb-3 inline-block w-fit rounded-full bg-indigo-500/20 px-4 py-1 text-xs font-semibold uppercase tracking-widest text-indigo-300 ring-1 ring-indigo-400/40"
            >New Arrival</span
          >
          <h2
            class="max-w-xl text-4xl font-extrabold leading-tight text-white drop-shadow-md md:text-5xl"
          >
            {{ slide.title }}
          </h2>
          <p class="mt-3 max-w-md text-base text-gray-300 md:text-lg">{{ slide.subtitle }}</p>
          <button
            type="button"
            class="mt-7 w-fit rounded-full bg-indigo-600 px-8 py-3 text-sm font-semibold text-white shadow-lg transition hover:bg-indigo-500 hover:scale-105 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2 focus:ring-offset-black"
          >
            {{ slide.cta }}
          </button>
        </div>
      </div>
    }
  </div>

  <button
    type="button"
    (click)="prev()"
    aria-label="Previous slide"
    class="absolute left-4 top-1/2 -translate-y-1/2 flex h-11 w-11 items-center justify-center rounded-full bg-black/40 text-white backdrop-blur-sm transition hover:bg-black/70 focus:outline-none focus:ring-2 focus:ring-white/60"
  >
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="size-5">
      <path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>

  <button
    type="button"
    (click)="next()"
    aria-label="Next slide"
    class="absolute right-4 top-1/2 -translate-y-1/2 flex h-11 w-11 items-center justify-center rounded-full bg-black/40 text-white backdrop-blur-sm transition hover:bg-black/70 focus:outline-none focus:ring-2 focus:ring-white/60"
  >
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="size-5">
      <path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>

  <div
    class="absolute bottom-5 left-1/2 flex -translate-x-1/2 gap-2"
    role="tablist"
    aria-label="Slide indicators"
  >
    @for (slide of slides; track slide.title; let i = $index) {
      <button
        type="button"
        role="tab"
        [attr.aria-selected]="i === current()"
        [attr.aria-label]="'Go to slide ' + (i + 1)"
        (click)="goTo(i)"
        class="h-2 rounded-full transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-white"
        [class]="i === current() ? 'w-7 bg-white' : 'w-2 bg-white/40 hover:bg-white/70'"
      ></button>
    }
  </div>
</section>
