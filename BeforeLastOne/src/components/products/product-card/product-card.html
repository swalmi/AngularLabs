<app-reusable-card>
  <div class="relative w-full overflow-hidden aspect-[4/3]">
    <div class="absolute inset-0 bg-slate-900 animate-pulse" *ngIf="!product().image"></div>
    <img
      [src]="product().image"
      [attr.alt]="product().name"
      class="w-full h-full object-cover transition-transform duration-700 ease-in-out group-hover:scale-110"
    />
    <!-- Overlay for glow effect -->
    <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/20 to-transparent opacity-80 mix-blend-multiply"></div>
    <div class="absolute top-4 right-4">
      <span
        class="rounded-full px-3 py-1 text-xs font-bold uppercase tracking-wider backdrop-blur-md border"
        [class]="product().quantity > 0 ? 'bg-cyan-500/20 text-cyan-300 border-cyan-500/30' : 'bg-red-500/20 text-red-300 border-red-500/30'"
      >
        {{ product().quantity > 0 ? 'In Stock' : 'Sold Out' }}
      </span>
    </div>
    <!-- Add to cart quick button -->
    <div class="absolute bottom-4 right-4 opacity-0 translate-y-4 transition-all duration-300 group-hover:opacity-100 group-hover:translate-y-0 hidden sm:block">
      <button class="bg-cyan-500 text-slate-950 rounded-full p-2 shadow-lg shadow-cyan-500/40 hover:bg-cyan-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:ring-offset-2 focus:ring-offset-slate-900 transition-all">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
        </svg>
      </button>
    </div>
  </div>

  <div class="flex flex-col flex-1 p-6 space-y-4 relative z-10">
    <div class="flex-1">
      <p class="text-xs font-bold uppercase tracking-[0.3em] text-cyan-400/80 mb-2">
        {{ product().category }}
      </p>
      <h3 class="text-xl font-bold text-white leading-tight mb-3 line-clamp-1">{{ product().name }}</h3>
      <p class="text-sm leading-relaxed text-slate-400 line-clamp-2">
        {{ product().description | shortenDescription: 4 }}
      </p>
    </div>

    <div class="h-px w-full bg-gradient-to-r from-white/10 via-white/5 to-transparent my-4"></div>

    <div class="flex items-center justify-between">
      <div class="flex flex-col">
        <span class="text-xs text-slate-500 uppercase tracking-widest font-semibold mb-1">Price</span>
        <span class="text-2xl font-black drop-shadow-md" [style.color]="product().price > 100 ? '#f43f5e' : '#2dd4bf'">
          ${{ product().price }}
        </span>
      </div>
      <div class="flex flex-col items-end">
        <span class="text-xs text-slate-500 uppercase tracking-widest font-semibold mb-1">Qty</span>
        <span class="text-lg font-bold text-slate-300">{{ product().quantity }}</span>
      </div>
    </div>
  </div>
</app-reusable-card>
