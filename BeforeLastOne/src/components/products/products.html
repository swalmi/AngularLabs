<div class="bg-slate-950 min-h-screen pt-28 pb-20 relative">
  <!-- Dynamic Background elements -->
  <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-cyan-900/20 rounded-full blur-[120px] pointer-events-none"></div>
  <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-purple-900/20 rounded-full blur-[100px] pointer-events-none"></div>

  <div class="relative mx-auto max-w-2xl px-4 sm:px-6 lg:max-w-7xl lg:px-8 z-10">
    

    <div class="mb-10 flex flex-col sm:flex-row sm:items-end justify-between gap-6 border-b border-white/10 pb-6">
      <div>
        <h1 class="text-4xl font-extrabold tracking-tight text-white drop-shadow-md">Our Collection</h1>
        <p class="mt-3 text-base text-slate-400">
          Loaded dynamically from the <span class="text-cyan-400 font-mono">ProductService</span>
        </p>
      </div>
      <div class="inline-flex items-center rounded-full bg-cyan-500/10 px-4 py-1.5 border border-cyan-500/30 text-sm font-medium text-cyan-300">
        Total Items: <span class="ml-2 font-bold">{{ products().length }}</span>
      </div>
    </div>

    <div class="grid grid-cols-1 gap-8 sm:grid-cols-2 lg:grid-cols-3 xl:gap-10">
      @for (product of products(); track product.id) {
        <app-product-card [product]="product" class="h-full"></app-product-card>
      }
    </div>
  </div>
</div>
