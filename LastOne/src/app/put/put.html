<div class="card border-0 shadow-lg rounded-4 mb-5" data-bs-theme="light">
  <div class="card-body p-4 p-md-5">
    <h2 class="text-dark fw-bold mb-4 border-bottom pb-3">Update Post Details</h2>

    <div *ngIf="successMessage" class="alert alert-success d-flex align-items-center shadow-sm" role="alert">
      <i class="bi bi-check-circle-fill flex-shrink-0 me-2 fs-4"></i>
      <div>{{ successMessage }}</div>
    </div>
    
    <div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-center shadow-sm" role="alert">
      <i class="bi bi-exclamation-triangle-fill flex-shrink-0 me-2 fs-4"></i>
      <div>{{ errorMessage }}</div>
    </div>

    <form (ngSubmit)="submitForm()" #form="ngForm" class="needs-validation">
      <div class="row g-4">
        <div class="col-md-4">
          <label class="form-label text-muted fw-semibold">Post ID</label>
          <input type="number" class="form-control form-control-lg bg-light border-0 shadow-sm" [(ngModel)]="model.id" name="id" required placeholder="e.g. 1" />
        </div>
        
        <div class="col-md-8">
          <label class="form-label text-muted fw-semibold">User ID</label>
          <input type="number" class="form-control form-control-lg bg-light border-0 shadow-sm" [(ngModel)]="model.userId" name="userId" required placeholder="e.g. 101" />
        </div>

        <div class="col-12">
          <label class="form-label text-muted fw-semibold">Title</label>
          <input type="text" class="form-control form-control-lg bg-light border-0 shadow-sm" [(ngModel)]="model.title" name="title" required placeholder="Post Title" />
        </div>

        <div class="col-12">
          <label class="form-label text-muted fw-semibold">Body Content</label>
          <textarea class="form-control form-control-lg bg-light border-0 shadow-sm" [(ngModel)]="model.body" name="body" rows="4" required placeholder="Write your post content here..."></textarea>
        </div>

        <div class="col-12 mt-5">
          <button type="submit" class="btn btn-warning btn-lg px-5 shadow-sm rounded-pill fw-bold text-dark" [disabled]="!form.valid">
            <i class="bi bi-pencil-square me-2"></i>Update Post
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<div *ngIf="response" class="mt-4 fade show">
  <h4 class="text-white mb-3 fw-light">Update Result</h4>
  <div class="card border-0 shadow bg-dark text-light rounded-4 border border-secondary">
    <div class="card-header bg-gradient bg-warning text-dark p-3 border-0 rounded-top-4 d-flex justify-content-between align-items-center">
      <h5 class="mb-0 fw-bold">{{ response.title }}</h5>
      <span class="badge bg-light text-warning rounded-pill px-3 py-2 border border-warning">Post ID: {{ response.id }}</span>
    </div>
    <div class="card-body p-4">
      <div class="bg-secondary bg-opacity-25 rounded-3 p-4 mb-3">
        <h6 class="text-warning text-uppercase fw-bold mb-2 small"><i class="bi bi-text-paragraph me-2"></i>Body</h6>
        <p class="mb-0 fs-5 text-light opacity-75">{{ response.body }}</p>
      </div>
      <div class="d-inline-flex bg-secondary bg-opacity-25 rounded-pill px-3 py-2 align-items-center">
        <span class="text-muted fw-bold me-2 small text-uppercase">User ID:</span>
        <span class="text-white fw-bold">{{ response.userId }}</span>
      </div>
    </div>
  </div>
</div>
