<div class="d-flex justify-content-between align-items-center mb-5 border-bottom border-secondary pb-3">
  <h2 class="text-light fw-bold mb-0">
    <i class="bi bi-clock-history me-2 text-primary"></i>{{ title() }}
  </h2>
  <span class="badge bg-primary rounded-pill px-3 py-2 fs-6 shadow-sm">{{ objects()?.length || 0 }} Posts</span>
</div>

<div class="row g-4 d-flex">
  <div class="col-12 col-md-6 col-lg-4" *ngFor="let item of objects()">
    <div class="card h-100 bg-dark text-light border border-secondary shadow-sm rounded-4 transition-hover d-flex flex-column">
      <div class="card-header bg-gradient bg-secondary bg-opacity-25 border-bottom border-dark p-4 flex-shrink-0">
        <h5 class="mb-0 fw-bold text-white lh-base">{{ item.title }}</h5>
      </div>
      <div class="card-body p-4 bg-opacity-10 bg-black flex-grow-1">
        <p class="text-light opacity-75 mb-0" style="font-size: 0.95rem; line-height: 1.6;">{{ item.body }}</p>
      </div>
      <div class="card-footer bg-transparent border-top border-dark p-3 d-flex justify-content-between align-items-center flex-shrink-0">
        <span class="badge bg-primary bg-opacity-25 text-primary border border-primary border-opacity-50 rounded-pill px-3 py-2 shadow-sm d-flex align-items-center">
          <i class="bi bi-person-circle me-1"></i> User ID: {{ item.userId }}
        </span>
        <span class="badge bg-secondary text-light rounded-pill px-3 py-2">
           <i class="bi bi-hash"></i> {{ item.id }}
        </span>
      </div>
    </div>
  </div>
</div>
