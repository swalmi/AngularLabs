<div class="card border-0 shadow-lg rounded-4 mb-5" data-bs-theme="light">
  <div class="card-body p-4 p-md-5">
    <h2 class="text-danger fw-bold mb-4 border-bottom pb-3">Remove Item</h2>

    <form (ngSubmit)="submitForm()" #form="ngForm" class="needs-validation">
      <div class="row g-4 align-items-end">
        <div class="col-md-8 col-lg-6">
          <label class="form-label text-muted fw-semibold">Item ID to Delete</label>
          <input type="number" class="form-control form-control-lg bg-light border-0 shadow-sm" [(ngModel)]="id" name="id" required placeholder="e.g. 42" />
        </div>

        <div class="col-md-4 mt-4 mt-md-0">
          <button type="submit" class="btn btn-danger w-100 btn-lg shadow-sm rounded-pill fw-bold" [disabled]="!form.valid">
            <i class="bi bi-trash3 me-2"></i>Delete
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<div *ngIf="responseMessage" class="mt-4">
  <div class="alert alert-success bg-gradient bg-success text-white border-0 shadow rounded-4 p-4 d-flex align-items-center fade show" role="alert">
    <i class="bi bi-check-circle-fill fs-3 me-3"></i>
    <div>
      <h5 class="alert-heading fw-bold mb-1">Success!</h5>
      <p class="mb-0">{{ responseMessage }}</p>
    </div>
  </div>
</div>

<div *ngIf="errorMessage" class="mt-4">
  <div class="alert alert-danger border-0 shadow rounded-4 p-4 d-flex align-items-center fade show" role="alert">
    <i class="bi bi-exclamation-triangle-fill fs-3 me-3"></i>
    <div>
      <h5 class="alert-heading fw-bold mb-1">Error</h5>
      <p class="mb-0">{{ errorMessage }}</p>
    </div>
  </div>
</div>
